apis:
  - aid: configure8:idp-rest-api
    name: Configure8 REST API
    description: >-
      The Configure8 REST API gives platform teams programmatic access to the
      service catalog, scorecards, self-service actions, environments, and
      cost data. It is used to ingest services and resources from external
      systems, drive scorecards in CI, trigger self-service actions, and
      synchronize the portal with source-of-truth systems. The API is part of
      the Configure8 enterprise feature set alongside RBAC, SSO/SCIM, and
      audit logging.
    humanURL: https://www.configure8.io/
    baseURL: https://app.configure8.io/api
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    tags:
