aid: configure8
name: Configure8
description: >-
  Configure8 is a commercial Internal Developer Portal (IDP) that gives
  engineering organizations a unified catalog of services, environments, and
  resources, with dependency mapping across cloud and on-premises
  infrastructure. It pairs that catalog with scorecards for software health
  and golden-path compliance, no-code self-service actions for developers,
  and FinOps-style cloud cost visibility. Configure8 supports SaaS and
  self-hosted deployments and ships with enterprise features such as RBAC,
  SCIM, SSO, audit logging, and a public REST API.
